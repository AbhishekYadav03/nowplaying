name: nowplaying
description: Real-time media sharing for friends and couples.
version: 1.0.4+7
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.2"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  firebase_analytics: ^12.1.3
  google_sign_in: ^7.2.0

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Media Detection
  audio_service: ^0.18.15

  # UI
  cached_network_image: ^3.4.1
  lottie: ^3.3.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^8.0.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  change_app_package_name: ^1.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
#  assets:
#    - assets/images/
#    - assets/animations/
dart:
  experiments:
    - native-assets